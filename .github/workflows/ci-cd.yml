name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    
    - name: Install uv
      run: pip install uv
    
    - name: Install dependencies
      run: uv sync
    
    - name: Run tests
      run: uv run pytest test/ -v

  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    
    - name: Install uv
      run: pip install uv
    
    - name: Install dependencies
      run: uv sync
    
    - name: Build documentation
      run: uv run make -C doc html
    
    - name: Upload documentation artifact
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: doc/_build/html

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: build-docs
    if: github.ref == 'refs/heads/master'
    
    steps:
    - uses: actions/checkout@v4
      with:
        repository: pascal2802/pascal2802.github.io
        path: gh-pages
        token: ${{ secrets.DEPLOY_TOKEN }}
    
    - name: Download documentation artifact
      uses: actions/download-artifact@v4
      with:
        name: documentation
        path: doc-build
    
    - name: Create otGpxTrack directory
      run: mkdir -p gh-pages/otGpxTrack
    
    - name: Copy documentation
      run: cp -r doc-build/* gh-pages/otGpxTrack/
    
    - name: Commit and push
      run: |
        cd gh-pages
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add otGpxTrack/
        git commit -m "Update otGpxTrack documentation"
        git push
